trigger: none

pool:
  vmImage: 'ubuntu-latest'

parameters:
- name: projectname
  default: 'icp'
  type: string
- name: customername
  default: ''
  type: string
- name: 'subscription'
  displayName: 'Azure Subscription'
  type: string
  default: 'icp-service-connection'

- name: seedType
  displayName: 'What to seed'
  type: string
  default: 'EventType'
  values:
    - EventType
    - IntegrationTarget

# EventType fields
- name: eventTypeName
  displayName: 'EventType: Name'
  type: string
  default: ''
- name: eventTypeAllowedTriggerTypes
  displayName: 'EventType: AllowedTriggerTypes (e.g. "Event" or "Schedule,OnDemand")'
  type: string
  default: ''
- name: eventTypeParametersTemplateJson
  displayName: 'EventType: ParametersTemplateJson (JSON)'
  type: string
  default: '{}'
- name: eventTypeDisplayName
  displayName: 'EventType: DisplayName'
  type: string
  default: ''
- name: eventTypeIconKey
  displayName: 'EventType: IconKey'
  type: string
  default: ''

# IntegrationTarget fields
- name: integrationTargetName
  displayName: 'IntegrationTarget: Name'
  type: string
  default: ''
- name: integrationTargetParametersTemplateJson
  displayName: 'IntegrationTarget: ParametersTemplateJson (JSON)'
  type: string
  default: '{}'
- name: integrationTargetSecretsTemplateJson
  displayName: 'IntegrationTarget: SecretsTemplateJson (JSON)'
  type: string
  default: '{}'
- name: integrationTargetAllowedTriggerTypes
  displayName: 'IntegrationTarget: AllowedTriggerTypes (e.g. "Event" or "Schedule,OnDemand")'
  type: string
  default: ''
- name: integrationTargetAvailability
  displayName: 'IntegrationTarget: Availability'
  type: string
  default: 'User'
- name: integrationTargetDisplayName
  displayName: 'IntegrationTarget: DisplayName'
  type: string
  default: ''
- name: integrationTargetIconKey
  displayName: 'IntegrationTarget: IconKey'
  type: string
  default: ''

variables:
  RuntimeDbName: ${{ parameters.projectname }}-${{ parameters.customername }}-runtime-db
  SqlName: ${{ parameters.projectname }}-${{ parameters.customername }}-sql
  RunnerProject: "src/Icp.SqlRunner/Icp.SqlRunner.csproj"

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '10.x'

- task: AzureCLI@2
  displayName: "Seed runtime DB (single item)"
  inputs:
    azureSubscription: "${{ parameters.subscription }}"
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -euo pipefail

      echo "DB name: $(RuntimeDbName)"
      SQL_SERVER_FQDN="$(SqlName).database.windows.net"

      TOKEN="$(az account get-access-token \
        --resource 'https://database.windows.net/' \
        --query accessToken -o tsv)"

      dotnet restore "$(RunnerProject)"

      SEED_TYPE='${{ parameters.seedType }}'

      if [ "$SEED_TYPE" = "EventType" ]; then
        NAME='${{ parameters.eventTypeName }}'
        if [ -z "$NAME" ]; then
          echo "ERROR: parameter 'eventTypeName' is required when seedType=EventType" >&2
          exit 2
        fi

        cat > seed_one.sql <<SQL
      SET NOCOUNT ON;

      ;WITH v AS (
        SELECT *
        FROM (VALUES
          (
            N'$NAME',
            N'${{ parameters.eventTypeAllowedTriggerTypes }}',
            N'${{ parameters.eventTypeParametersTemplateJson }}',
            N'${{ parameters.eventTypeDisplayName }}',
            N'${{ parameters.eventTypeIconKey }}'
          )
        ) AS x([Name], [AllowedTriggerTypes], [ParametersTemplateJson], [DisplayName], [IconKey])
      )
      MERGE dbo.EventTypes WITH (HOLDLOCK) AS t
      USING v AS s
        ON t.[Name] = s.[Name]
      WHEN MATCHED THEN
        UPDATE SET
          t.[AllowedTriggerTypes]    = s.[AllowedTriggerTypes],
          t.[ParametersTemplateJson] = s.[ParametersTemplateJson],
          t.[DisplayName]            = s.[DisplayName],
          t.[IconKey]                = s.[IconKey]
      WHEN NOT MATCHED BY TARGET THEN
        INSERT ([Name], [AllowedTriggerTypes], [ParametersTemplateJson], [DisplayName], [IconKey])
        VALUES (s.[Name], s.[AllowedTriggerTypes], s.[ParametersTemplateJson], s.[DisplayName], s.[IconKey]);
      SQL

      elif [ "$SEED_TYPE" = "IntegrationTarget" ]; then
        NAME='${{ parameters.integrationTargetName }}'
        if [ -z "$NAME" ]; then
          echo "ERROR: parameter 'integrationTargetName' is required when seedType=IntegrationTarget" >&2
          exit 2
        fi

        cat > seed_one.sql <<SQL
      SET NOCOUNT ON;

      ;WITH v AS (
        SELECT *
        FROM (VALUES
          (
            N'$NAME',
            N'${{ parameters.integrationTargetParametersTemplateJson }}',
            N'${{ parameters.integrationTargetSecretsTemplateJson }}',
            N'${{ parameters.integrationTargetAllowedTriggerTypes }}',
            N'${{ parameters.integrationTargetAvailability }}',
            N'${{ parameters.integrationTargetDisplayName }}',
            N'${{ parameters.integrationTargetIconKey }}'
          )
        ) AS x([Name], [ParametersTemplateJson], [SecretsTemplateJson], [AllowedTriggerTypes], [Availability], [DisplayName], [IconKey])
      )
      MERGE dbo.IntegrationTargets WITH (HOLDLOCK) AS t
      USING v AS s
        ON t.[Name] = s.[Name]
      WHEN MATCHED THEN
        UPDATE SET
          t.[ParametersTemplateJson] = s.[ParametersTemplateJson],
          t.[SecretsTemplateJson]    = s.[SecretsTemplateJson],
          t.[AllowedTriggerTypes]    = s.[AllowedTriggerTypes],
          t.[Availability]           = s.[Availability],
          t.[DisplayName]            = s.[DisplayName],
          t.[IconKey]                = s.[IconKey]
      WHEN NOT MATCHED BY TARGET THEN
        INSERT ([Name], [ParametersTemplateJson], [SecretsTemplateJson], [AllowedTriggerTypes], [Availability], [DisplayName], [IconKey])
        VALUES (s.[Name], s.[ParametersTemplateJson], s.[SecretsTemplateJson], s.[AllowedTriggerTypes], s.[Availability], s.[DisplayName], s.[IconKey]);
      SQL

      else
        echo "ERROR: Unknown seedType: $SEED_TYPE" >&2
        exit 2
      fi

      dotnet run --property WarningLevel=0 --project "$(RunnerProject)" -- \
        "$SQL_SERVER_FQDN" "$(RuntimeDbName)" "$TOKEN" "seed_one.sql"
