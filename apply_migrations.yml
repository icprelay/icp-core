trigger: none

pool:
  vmImage: 'ubuntu-latest'


parameters:
- name: projectname
  default: 'icp'
  type: string
- name: customername
  default: ''
  type: string
- name: 'subscription'
  displayName: 'Azure Subscription'
  type: string
  default: 'icp-service-connection'

variables:
  ResourceGroup: "icp-persistent"
  RuntimeDbName: ${{ parameters.projectname }}-${{ parameters.customername }}-runtime-db
  SqlName: ${{ parameters.projectname }}-${{ parameters.customername }}-sql
  ApiUamiName: "${{ parameters.projectname }}-${{ parameters.customername }}-web-api-uami"
  LogicAppUamiName: "${{ parameters.projectname }}-${{ parameters.customername }}-logicapp-uami"
  EfProject: "src/Icp.Persistence/Icp.Persistence.csproj"
  RunnerProject: "src/Icp.SqlRunner/Icp.SqlRunner.csproj"

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '10.x'
        
- task: AzureCLI@2
  displayName: "Run EF migrations"
  inputs:
    azureSubscription: "${{ parameters.subscription }}"
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
     set -euo pipefail
     
     echo "DB name: $(RuntimeDbName)"
     SQL_SERVER_FQDN="$(SqlName).database.windows.net"
     
     # Build and generate idempotent migration script
     dotnet restore "$(EfProject)"
     dotnet build "$(EfProject)" -c Release --no-restore
     dotnet build "$(EfProject)" -c Debug --no-restore
     
     # Ensure dotnet-ef is available. Prefer local tool manifest if you have one.
     dotnet tool restore || true
     if ! dotnet ef --version >/dev/null 2>&1; then
       dotnet tool install --global dotnet-ef
       export PATH="$PATH:$HOME/.dotnet/tools"
     fi
     
     dotnet ef migrations script \
       --idempotent \
       --project "$(EfProject)" \
       --context RuntimeDbContext \
       --output migrate_runtime.sql \
       --no-build \
       --verbose
     
     # Get Entra access token for Azure SQL
     TOKEN="$(az account get-access-token \
       --resource "https://database.windows.net/" \
       --query accessToken -o tsv)"
          
     dotnet restore $(RunnerProject)
     dotnet run --property WarningLevel=0 --project $(RunnerProject) -- \
       "$SQL_SERVER_FQDN" "$(RuntimeDbName)" "$TOKEN" "migrate_runtime.sql"
     
     cat > grants.sql <<SQL
     -- Create contained users (idempotent)
     IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'$(ApiUamiName)')
         CREATE USER [$(ApiUamiName)] FROM EXTERNAL PROVIDER;
     
     IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'$(LogicAppUamiName)')
         CREATE USER [$(LogicAppUamiName)] FROM EXTERNAL PROVIDER;
     
     -- Grant read/write (idempotent)
     IF IS_ROLEMEMBER('db_datareader', N'$(ApiUamiName)') <> 1
         ALTER ROLE db_datareader ADD MEMBER [$(ApiUamiName)];
     
     IF IS_ROLEMEMBER('db_datawriter', N'$(ApiUamiName)') <> 1
         ALTER ROLE db_datawriter ADD MEMBER [$(ApiUamiName)];
     
     IF IS_ROLEMEMBER('db_datareader', N'$(LogicAppUamiName)') <> 1
         ALTER ROLE db_datareader ADD MEMBER [$(LogicAppUamiName)];
     
     IF IS_ROLEMEMBER('db_datawriter', N'$(LogicAppUamiName)') <> 1
         ALTER ROLE db_datawriter ADD MEMBER [$(LogicAppUamiName)];
     
     -- GRANT EXECUTE TO [$(ApiUamiName)];
     -- GRANT EXECUTE TO [$(LogicAppUamiName)];
     SQL
     
     dotnet run --property WarningLevel=0 --project $(RunnerProject) -- \
       "$SQL_SERVER_FQDN" "$(RuntimeDbName)" "$TOKEN" "grants.sql"
    
     cat > seed.sql <<SQL
     -- Insert EventTypes
     ;WITH v AS (
         SELECT *
         FROM (VALUES
             ('core-smoke','Event','{}','Smoke test','heart-pulse'),
             ('count-blob','Schedule,OnDemand','{}','Count blobs (smoke test)','heart-pulse')
         ) AS x([Name], [AllowedTriggerTypes], [ParametersTemplateJson], [DisplayName], [IconKey])
     )
     MERGE dbo.EventTypes WITH (HOLDLOCK) AS t
     USING v AS s
         ON t.[Name] = s.[Name]
     WHEN MATCHED THEN
         UPDATE SET
             t.[AllowedTriggerTypes]      = s.[AllowedTriggerTypes],
             t.[ParametersTemplateJson]   = s.[ParametersTemplateJson],
             t.[DisplayName]              = s.[DisplayName],
             t.[IconKey]                  = s.[IconKey]
     WHEN NOT MATCHED BY TARGET THEN
         INSERT ([Name], [AllowedTriggerTypes], [ParametersTemplateJson], [DisplayName], [IconKey])
         VALUES (s.[Name], s.[AllowedTriggerTypes], s.[ParametersTemplateJson], s.[DisplayName], s.[IconKey]);
     -- No delete branch on purpose (avoid accidental removals) 
 
     --Seed IntegrationTargets:
 
     -- 1) UPDATE existing rows (idempotent)
     UPDATE t
     SET
         t.ParametersTemplateJson = v.ParametersTemplateJson,
         t.SecretsTemplateJson    = v.SecretsTemplateJson,
         t.AllowedTriggerTypes    = v.AllowedTriggerTypes,
         t.Availability           = v.Availability,
         t.DisplayName            = v.DisplayName,
         t.IconKey                = v.IconKey
     FROM dbo.IntegrationTargets AS t
     JOIN (
         VALUES
             (N'sink-blob', N'{}',                N'{}',  N'Event',     N'User', N'Blob Storage', N'archive'),
             (N'sink-countblobs', N'{"container":"icp-sink-blob"}',                N'{}',  N'Schedule,OnDemand',     N'User', N'Blob Storage', N'archive')
     ) AS v(Name, ParametersTemplateJson, SecretsTemplateJson, AllowedTriggerTypes, Availability, DisplayName, IconKey)
         ON t.Name = v.Name;
 
     -- 2) INSERT missing rows (idempotent)
     INSERT INTO dbo.IntegrationTargets (Name, ParametersTemplateJson, SecretsTemplateJson, AllowedTriggerTypes, Availability, DisplayName, IconKey)
     SELECT
         v.Name,
         v.ParametersTemplateJson,
         v.SecretsTemplateJson,
         v.AllowedTriggerTypes,
         v.Availability,
         v.DisplayName,
         v.IconKey
     FROM (
         VALUES
             (N'sink-blob', N'{}',         N'{}',              N'Event',N'User', N'Blob Storage', N'archive'),
             (N'sink-countblobs', N'{"container":"icp-sink-blob"}',                N'{}',  N'Schedule,OnDemand',     N'User', N'Blob Storage', N'archive')
     ) AS v(Name, ParametersTemplateJson, SecretsTemplateJson, AllowedTriggerTypes, Availability, DisplayName, IconKey)
     WHERE NOT EXISTS (
         SELECT 1
         FROM dbo.IntegrationTargets t
         WHERE t.Name = v.Name
     );
 
 
      -- Seed schedule time zones lookup table
      -- Assumes table: dbo.ScheduleTimeZones (Id nvarchar(100) PK, DisplayName nvarchar(200), Enabled bit, SortOrder int)
 
     SET NOCOUNT ON;
 
     MERGE dbo.ScheduleTimeZones AS tgt
     USING (VALUES
         (N'FLE Standard Time',     N'Helsinki (UTC+2 / UTC+3)', CAST(1 AS bit), 10),
         (N'GMT Standard Time',     N'London (UTC+0 / UTC+1)',   CAST(1 AS bit), 20),
         (N'W. Europe Standard Time', N'Berlin (UTC+1 / UTC+2)', CAST(1 AS bit), 30)
     ) AS src (Id, DisplayName, Enabled, SortOrder)
     ON tgt.Id = src.Id
     WHEN MATCHED THEN
         UPDATE SET
             tgt.DisplayName = src.DisplayName,
             tgt.Enabled = src.Enabled,
             tgt.SortOrder = src.SortOrder
     WHEN NOT MATCHED BY TARGET THEN
         INSERT (Id, DisplayName, Enabled, SortOrder)
         VALUES (src.Id, src.DisplayName, src.Enabled, src.SortOrder);
 
     -- Optional: disable any other existing time zones not in the seed set
     -- UPDATE dbo.ScheduleTimeZones
     -- SET Enabled = 0
     -- WHERE Id NOT IN (N'FLE Standard Time', N'GMT Standard Time', N'W. Europe Standard Time');
 
     SQL

     dotnet run --property WarningLevel=0 --project $(RunnerProject) -- \
       "$SQL_SERVER_FQDN" "$(RuntimeDbName)" "$TOKEN" "seed.sql"