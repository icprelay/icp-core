trigger: none

parameters:
- name: 'projectname'
  displayName: 'Project name'
  type: string
  default: 'icp'
- name: 'customername'
  displayName: 'Customer name'
  type: string
  default: ''
- name: 'subscription'
  displayName: 'Azure Subscription'
  type: string
  default: 'icp-service-connection'

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.slnx'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
 
steps:
- task: UseDotNet@2
  displayName: 'Use .NET 10.0 SDK'
  inputs:
    packageType: sdk
    version: 10.0.x
    installationPath: $(Agent.ToolsDirectory)/dotnet
 
- task: NuGetToolInstaller@1
 
- task: DotNetCoreCLI@2
  inputs:
    command: 'restore'
    projects: 'src\Icp.Api.Host\Icp.Api.Host.csproj'
    includeNuGetOrg: true
        
- task: DotNetCoreCLI@2
  displayName: 'Publish web api csproj files'
  inputs:
    command: publish
    arguments: -c Release
    projects: |
      src\Icp.Api.Host\Icp.Api.Host.csproj
    publishWebProjects: false
    zipAfterPublish: false
 
- task: ArchiveFiles@2
  displayName: 'Zip web api'
  inputs:
    rootFolderOrFile: 'src\Icp.Api.Host\bin\Release\net10.0\publish\'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.DefaultWorkingDirectory)/api.zip'
    replaceExistingArchive: true
    verbose: true

- task: PublishBuildArtifacts@1
  displayName: publish web artifact
  inputs:
    PathtoPublish: '$(Build.DefaultWorkingDirectory)/api.zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'

- task: DownloadBuildArtifacts@0
  displayName: 'Download Artifact'
  inputs:
    buildVersionToDownload: latest
    downloadType: single
    artifactName: drop
    downloadPath: '$(System.DefaultWorkingDirectory)'

- task: AzureWebApp@1
  displayName: 'Publish artifact'
  inputs:
    azureSubscription: ${{ parameters.subscription }}
    resourceGroupName: 'icp-runtime'
    appType: webApp
    appName: '${{ parameters.projectname}}-${{ parameters.customername }}-web-api'
    deploymentMethod: zipDeploy
    package: '$(System.DefaultWorkingDirectory)/drop/api.zip'