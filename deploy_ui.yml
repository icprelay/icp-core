trigger: none

parameters:
- name: 'projectname'
  displayName: 'Project name'
  type: string
  default: 'icp'
- name: 'customername'
  displayName: 'Customer name'
  type: string
  default: ''
- name: 'subscription'
  displayName: 'Azure Subscription'
  type: string
  default: 'icp-service-connection'

pool:
  vmImage: 'windows-latest'

name: $(majorMinorVersion).$(patch)

variables:
  majorMinorVersion: 0.9 #this is used as the seed value for the counter below
  patch: $[counter(variables['majorMinorVersion'], 0)]  # the counter increments by one each run
  solution: '**/*.slnx'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
 
steps:
- task: UseDotNet@2
  displayName: 'Use .NET 10.0 SDK'
  inputs:
    packageType: sdk
    version: 10.0.x
    installationPath: $(Agent.ToolsDirectory)/dotnet
 
- task: NuGetToolInstaller@1
 
- task: DotNetCoreCLI@2
  displayName: 'Restore UI project'
  inputs:
    command: 'restore'
    projects: 'src\Icp.Ui\Icp.Ui.csproj'
    includeNuGetOrg: true
        
- task: DotNetCoreCLI@2
  displayName: 'Publish web UI csproj files'
  inputs:
    command: publish
    arguments: > 
      -c Release
      /p:Version=$(Build.BuildNumber)
      /p:AssemblyVersion=$(Build.BuildNumber)
      /p:FileVersion=$(Build.BuildNumber)
      /p:InformationalVersion=$(Build.BuildNumber)+$(Build.SourceBranchName).$(Build.SourceVersion)
    projects: |
      src\Icp.Ui\Icp.Ui.csproj
    publishWebProjects: false
    zipAfterPublish: false
 
- task: ArchiveFiles@2
  displayName: 'Zip web UI'
  inputs:
    rootFolderOrFile: 'src\Icp.Ui\bin\Release\net10.0\publish\'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.DefaultWorkingDirectory)/ui.zip'
    replaceExistingArchive: true
    verbose: true

- task: PublishBuildArtifacts@1
  displayName: publish web artifact
  inputs:
    PathtoPublish: '$(Build.DefaultWorkingDirectory)/ui.zip'
    ArtifactName: 'drop'
    publishLocation: 'Container'

- task: DownloadBuildArtifacts@0
  displayName: 'Download Artifact'
  inputs:
    buildVersionToDownload: latest
    downloadType: single
    artifactName: drop
    downloadPath: '$(System.DefaultWorkingDirectory)'

- task: AzureWebApp@1
  displayName: 'Publish artifact'
  inputs:
    azureSubscription: ${{ parameters.subscription }}
    resourceGroupName: 'icp-runtime'
    appType: webApp
    appName: '${{ parameters.projectname}}-${{ parameters.customername }}-web-ui'
    deploymentMethod: zipDeploy
    package: '$(System.DefaultWorkingDirectory)/drop/ui.zip'